<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TICKER__ — Fundamentals &amp; Outlook Instrument Panel</title>
<!--
  ============================================================================
  ibkr_review_ticker · dashboard template
  ----------------------------------------------------------------------------
  HOW TO USE: Edit ONLY the CONFIG object at the bottom (inside <script>).
  Every visible value, gauge, rail, cell, scenario and event is rendered from
  CONFIG. Do not hand-edit the HTML body — it is generated by render().
  Replace __TICKER__ in <title> with the symbol. Save the finished file to
  /mnt/user-data/outputs/<ticker>-dashboard.html and present it.
  The design system (dark instrument panel, amber = subject highlight) is
  intentional — keep it. See SKILL.md for the data contract.
  ============================================================================
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root{
    --bg:#0d1521; --panel:#14202f; --panel2:#1a2737;
    --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
    --ink:#e8eef6; --muted:#8295ab; --faint:#5d6e83;
    --cyan:#45d6c6; --amber:#f6b13e; --rose:#fb6f8e; --green:#5fd699;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --disp:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--disp);line-height:1.4;padding:18px 14px 60px;
    background-image:radial-gradient(900px 500px at 80% -10%,rgba(69,214,198,.06),transparent 60%),radial-gradient(700px 500px at -10% 30%,rgba(246,177,62,.05),transparent 55%)}
  .wrap{max-width:980px;margin:0 auto}
  .head{border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,var(--panel2),var(--panel));padding:18px 18px 16px;position:relative;overflow:hidden}
  .head::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,var(--rose),transparent);height:3px;opacity:.85}
  .tkr-row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px}
  .tkr{font-weight:700;font-size:clamp(30px,8vw,46px);letter-spacing:-1px;line-height:1}
  .tkr small{display:block;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:6px;font-family:var(--disp)}
  .price{text-align:right}
  .price .big{font-family:var(--mono);font-size:clamp(26px,7vw,38px);font-weight:600}
  .price .big small{font-size:13px;margin-left:6px;font-weight:500}
  .chips{display:flex;gap:6px;justify-content:flex-end;margin-top:8px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--line2);color:var(--muted)}
  .chip.dn{color:var(--rose);border-color:rgba(251,111,142,.35);background:rgba(251,111,142,.08)}
  .chip.up{color:var(--cyan);border-color:rgba(69,214,198,.35);background:rgba(69,214,198,.08)}
  .chip.warn{color:var(--amber);border-color:rgba(246,177,62,.35);background:rgba(246,177,62,.08)}
  .status{margin-top:14px;padding-top:13px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted);display:flex;gap:8px;align-items:flex-start}
  .status b{color:var(--amber);font-weight:600}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--rose);margin-top:5px;flex:none;box-shadow:0 0 0 4px rgba(251,111,142,.12)}
  section{margin-top:26px}
  .eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:13px}
  .eyebrow h2{font-size:13px;font-weight:600;letter-spacing:.18em;text-transform:uppercase}
  .eyebrow .ix{font-family:var(--mono);font-size:11px;color:var(--amber);border:1px solid rgba(246,177,62,.3);border-radius:5px;padding:1px 6px}
  .eyebrow .rule{flex:1;height:1px;background:var(--line)}
  .grid{display:grid;gap:10px}
  .g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
  .cell{border:1px solid var(--line);border-radius:11px;background:var(--panel);padding:13px 13px 12px}
  .cell .lab{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-weight:500}
  .cell .val{font-family:var(--mono);font-size:22px;font-weight:600;margin-top:7px;letter-spacing:-.5px}
  .cell .val.sm{font-size:18px}
  .cell .tag{font-family:var(--mono);font-size:10.5px;margin-top:6px;color:var(--muted)}
  .cell .tag.good{color:var(--cyan)} .cell .tag.bad{color:var(--rose)} .cell .tag.warn{color:var(--amber)}
  .signals{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:11px}
  .sigcol{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:14px 15px}
  .sigcol h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .sigcol.up h3{color:var(--cyan)} .sigcol.dn h3{color:var(--rose)}
  .sigcol h3 .ar{font-family:var(--mono);font-size:13px}
  .sigcol li{list-style:none;font-size:11.5px;color:var(--muted);padding:7px 0;border-top:1px solid var(--line);line-height:1.45}
  .sigcol li:first-of-type{border-top:none}
  .sigcol li b{color:var(--ink);font-weight:600}
  .dist{border:1px solid var(--line);border-radius:13px;background:var(--panel);padding:16px 14px 10px}
  .dist svg{display:block;width:100%;height:auto}
  .diststats{display:flex;gap:10px;flex-wrap:wrap;margin:6px 6px 4px}
  .ds{flex:1;min-width:120px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);padding:11px 12px}
  .ds .l{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .ds .v{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:4px}
  .ds .v small{font-size:11px;color:var(--muted);font-weight:400}
  .scen{margin-top:12px}
  .srow{display:grid;grid-template-columns:128px 1fr 44px;gap:11px;align-items:center;padding:9px 4px;border-top:1px solid var(--line)}
  .srow:first-child{border-top:none}
  .srow .sl{font-size:11.5px} .srow .sl b{display:block;font-weight:600;font-size:12px}
  .srow .sl span{font-family:var(--mono);font-size:10px;color:var(--faint)}
  .srow .strack{height:13px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .srow .sfill{height:100%;border-radius:7px}
  .srow .sp{font-family:var(--mono);font-size:13px;font-weight:600;text-align:right}
  .scaption{font-size:11px;color:var(--faint);margin:9px 4px 4px;line-height:1.5}
  .gauges{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .gauge{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:14px;text-align:center}
  .gauge svg{display:block;margin:0 auto}
  .gauge .gl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-top:3px}
  .gauge .gn{font-size:10.5px;color:var(--muted);margin-top:7px;font-family:var(--mono)}
  .gauge .gn b{color:var(--cyan);font-weight:600}
  .railnote{font-size:12px;color:var(--muted);margin:-4px 0 16px}
  .rail{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:15px 16px 30px;margin-bottom:11px}
  .rail-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px;gap:10px;flex-wrap:wrap}
  .rail-h .name{font-size:12.5px;font-weight:600} .rail-h .name span{color:var(--faint);font-weight:400;font-size:11px;margin-left:6px}
  .rail-h .rank{font-family:var(--mono);font-size:11.5px;color:var(--amber);border:1px solid rgba(246,177,62,.3);border-radius:6px;padding:2px 8px;white-space:nowrap}
  .track{position:relative;height:2px;background:var(--line2);border-radius:2px;margin:0 4px}
  .pt{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:var(--faint)}
  .pt .pl{position:absolute;left:50%;transform:translateX(-50%);top:13px;font-family:var(--mono);font-size:9.5px;color:var(--faint);white-space:nowrap}
  .pt .pv{position:absolute;left:50%;transform:translateX(-50%);bottom:13px;font-family:var(--mono);font-size:9.5px;white-space:nowrap;display:none}
  .pt.subj{width:15px;height:15px;background:var(--amber);box-shadow:0 0 0 5px rgba(246,177,62,.16),0 0 14px rgba(246,177,62,.5);z-index:3}
  .pt.subj .pl{color:var(--amber);font-weight:600;font-size:10.5px;top:16px}
  .pt.subj .pv{display:block;color:var(--amber);font-weight:600;font-size:10.5px;bottom:16px}
  .scaleends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--faint);margin:18px 4px 0}
  .bars{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:16px}
  .bar{display:grid;grid-template-columns:120px 1fr auto;gap:12px;align-items:center;margin-bottom:13px}
  .bar:last-child{margin-bottom:0}
  .bar .bl{font-size:11.5px;color:var(--muted)}
  .bar .btrack{height:9px;background:var(--panel2);border-radius:5px;overflow:hidden;border:1px solid var(--line)}
  .bar .bfill{height:100%;border-radius:5px;background:linear-gradient(90deg,rgba(69,214,198,.5),var(--cyan))}
  .bar .bfill.amber{background:linear-gradient(90deg,rgba(246,177,62,.5),var(--amber))}
  .bar .bv{font-family:var(--mono);font-size:13px;font-weight:600;white-space:nowrap;min-width:74px;text-align:right}
  .capex-flag{margin-top:14px;padding:11px 13px;border:1px solid rgba(246,177,62,.28);background:rgba(246,177,62,.07);border-radius:9px;font-size:12px}
  .capex-flag b{color:var(--amber)}
  .analyst{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:16px 16px 22px}
  .atrack{position:relative;height:6px;border-radius:6px;margin:34px 6px 6px;background:linear-gradient(90deg,var(--rose),var(--amber) 38%,var(--cyan))}
  .amark{position:absolute;top:50%;transform:translate(-50%,-50%);width:3px;height:20px;border-radius:2px}
  .amark.cur{background:#fff;box-shadow:0 0 10px rgba(255,255,255,.6)}
  .amark .ml{position:absolute;left:50%;transform:translateX(-50%);bottom:24px;font-family:var(--mono);font-size:10px;white-space:nowrap}
  .aends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);margin:8px 6px 0}
  .acon{display:flex;gap:8px;align-items:center;margin-top:16px;flex-wrap:wrap}
  .acon .pill{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:999px;background:rgba(69,214,198,.12);color:var(--cyan);border:1px solid rgba(69,214,198,.3)}
  .acon .txt{font-size:11.5px;color:var(--muted)}
  .events{border:1px solid var(--line);border-radius:12px;background:var(--panel);overflow:hidden}
  .ev{display:grid;grid-template-columns:96px 1fr;gap:14px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .ev:last-child{border-bottom:none}
  .ev .when{font-family:var(--mono);font-size:11.5px;color:var(--amber);font-weight:500}
  .ev .when small{display:block;color:var(--faint);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;margin-top:3px;font-weight:400}
  .ev .what b{font-size:13px;font-weight:600;display:block;margin-bottom:3px}
  .ev .what p{font-size:11.5px;color:var(--muted)}
  .ev.key{background:linear-gradient(90deg,rgba(246,177,62,.06),transparent)}
  .ev .badge{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);border:1px solid rgba(246,177,62,.3);border-radius:4px;padding:1px 5px;display:inline-block;margin-top:5px}
  .ev .badge.risk{color:var(--rose);border-color:rgba(251,111,142,.35)}
  .foot{margin-top:28px;padding-top:16px;border-top:1px solid var(--line);font-size:11px;color:var(--faint);line-height:1.6}
  .foot b{color:var(--muted)}
  @media (prefers-reduced-motion:no-preference){.anim{opacity:0;transform:translateY(10px);animation:rise .6s cubic-bezier(.2,.7,.3,1) forwards}@keyframes rise{to{opacity:1;transform:none}}}
  @media (max-width:680px){
    .g4{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(2,1fr)}
    .gauges{grid-template-columns:repeat(2,1fr)} .signals{grid-template-columns:1fr}
    .bar{grid-template-columns:84px 1fr;grid-template-rows:auto auto;row-gap:5px} .bar .bv{grid-column:2;text-align:left;min-width:0}
    .srow{grid-template-columns:106px 1fr 38px;gap:8px}
  }
  @media (max-width:380px){.g4,.g3,.gauges{grid-template-columns:1fr 1fr} .ev{grid-template-columns:78px 1fr;gap:10px}}
</style>
</head>

<script>

  ],

  footerHTML:'<b>Live quote &amp; volatility via Interactive Brokers, ~June 29 2026.</b> Spot $367.59 · IV 42.2% (100th percentile) · 30d realized vol 34.5%. Fundamentals are TTM; peer figures approximate and rounded for context. Probability scenarios are option-implied + judgment, not predictions, and will reprice the instant earnings hit.<br>Sources: IBKR live data, company filings &amp; transcripts, and reputable market-data aggregators. <b>Informational dashboard, not investment advice.</b>'
};

/* ===========================================================================
   RENDER — do not edit below unless changing the layout itself.
   =========================================================================== */
const C = CONFIG, SUBJ = C.peerOrder[0];
const cellHTML = c => `<div class="cell"><div class="lab">${c.lab}</div><div class="val${c.sm?' sm':''}">${c.val}</div><div class="tag ${c.tagcls||''}">${c.tag}</div></div>`;
const eb = (ix,t) => `<div class="eyebrow"><span class="ix">${ix}</span><h2>${t}</h2><span class="rule"></span></div>`;

function lognormPDF(x,muLog,s){ return x<=0?0:Math.exp(-Math.pow(Math.log(x)-muLog,2)/(2*s*s))/(x*s*Math.sqrt(2*Math.PI)); }
function normCDF(z){ // Abramowitz-Stegun
  const t=1/(1+0.2316419*Math.abs(z)), d=0.3989423*Math.exp(-z*z/2);
  let p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));
  return z>0?1-p:p;
}

function distSVG(){
  const d=C.dist, S0=d.spot, sig=d.sigma, T=d.T, s=sig*Math.sqrt(T);
  const muLog=Math.log(S0)+(d.r-0.5*sig*sig)*T;
  const [PMIN,PMAX]=d.domain, W=700,H=250,padB=42,padT=14;
  const X=p=>((p-PMIN)/(PMAX-PMIN))*W;
  let pts=[],maxF=0;
  for(let i=0;i<=160;i++){const p=PMIN+(PMAX-PMIN)*i/160,f=lognormPDF(p,muLog,s);pts.push([p,f]);if(f>maxF)maxF=f;}
  const Y=f=>(H-padB)-(f/maxF)*(H-padB-padT);
  let area="M "+X(PMIN).toFixed(1)+" "+(H-padB);
  pts.forEach(pt=>area+=" L "+X(pt[0]).toFixed(1)+" "+Y(pt[1]).toFixed(1));
  area+=" L "+X(PMAX).toFixed(1)+" "+(H-padB)+" Z";
  const line="M "+pts.map(pt=>X(pt[0]).toFixed(1)+" "+Y(pt[1]).toFixed(1)).join(" L ");
  let bl="";
  d.bounds.forEach(b=>{bl+=`<line x1="${X(b).toFixed(1)}" y1="${padT}" x2="${X(b).toFixed(1)}" y2="${H-padB}" stroke="rgba(255,255,255,.10)" stroke-dasharray="2 4"/><text x="${X(b).toFixed(1)}" y="${H-padB+13}" text-anchor="middle" fill="#5d6e83" font-family="IBM Plex Mono" font-size="10">$${b}</text>`;});
  let zl="";
  d.zoneLabels.forEach(z=>zl+=`<text x="${X(z.at).toFixed(1)}" y="${padT+18}" text-anchor="middle" fill="${z.c}" font-family="Space Grotesk" font-size="10" font-weight="600">${z.txt}</text>`);
  const sx=X(S0).toFixed(1);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="zg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fb6f8e" stop-opacity=".55"/><stop offset="0.27" stop-color="#fb6f8e" stop-opacity=".42"/>
      <stop offset="0.42" stop-color="#f6b13e" stop-opacity=".45"/><stop offset="0.55" stop-color="#f6b13e" stop-opacity=".4"/>
      <stop offset="0.73" stop-color="#45d6c6" stop-opacity=".42"/><stop offset="1" stop-color="#45d6c6" stop-opacity=".5"/>
    </linearGradient></defs>${bl}
    <path d="${area}" fill="url(#zg)"/><path d="${line}" fill="none" stroke="#e8eef6" stroke-width="2" stroke-linejoin="round"/>
    <line x1="${sx}" y1="${padT}" x2="${sx}" y2="${H-padB}" stroke="#fff" stroke-width="1.5"/>
    <circle cx="${sx}" cy="${padT}" r="3" fill="#fff"/>
    <text x="${sx}" y="${padT-2}" text-anchor="middle" fill="#fff" font-family="IBM Plex Mono" font-size="10" font-weight="600">spot $${S0}</text>${zl}</svg>`;
}

function render(){
  const railNote = C.railNoteHTML.split('MSFT').join(SUBJ);
  const a=C.analyst, apos=v=>((v-a.low)/(a.high-a.low)*100).toFixed(1);
  document.title = C.ticker+" — Fundamentals & Outlook";
  document.getElementById('app').innerHTML = `
  <header class="head anim">
    <div class="tkr-row">
      <div class="tkr">${C.ticker}<small>${C.name} · ${C.meta}</small></div>
      <div class="price"><div class="big">${C.price}<small class="${C.dayChange.cls==='up'?'':''}" style="color:var(--${C.dayChange.cls==='up'?'cyan':'rose'})">${C.dayChange.txt}</small></div>
        <div class="chips">${C.headChips.map(c=>`<span class="chip ${c.cls}">${c.t}</span>`).join('')}</div></div>
    </div>
    <div class="status"><span class="dot"></span><span>${C.statusHTML}</span></div>
  </header>

  <section class="anim" style="animation-delay:.05s">${eb('01','Vital signs')}<div class="grid g4">${C.vitals.map(cellHTML).join('')}</div></section>

  <section class="anim" style="animation-delay:.1s">${eb('02','Options &amp; volatility positioning')}
    <div class="grid g3">${C.options.map(cellHTML).join('')}</div>
    <div class="signals">
      <div class="sigcol up"><h3><span class="ar">▲</span> Points to recovery</h3>${C.recoverySignals.map(t=>`<li>${t}</li>`).join('')}</div>
      <div class="sigcol dn"><h3><span class="ar">▼</span> Points to more decline</h3>${C.declineSignals.map(t=>`<li>${t}</li>`).join('')}</div>
    </div></section>

  <section class="anim" style="animation-delay:.15s">${eb('03','6-month price probability')}
    <div class="dist">${distSVG()}
      <div class="diststats">${C.distStats.map(d=>`<div class="ds"><div class="l">${d.l}</div><div class="v">${d.v}${d.sub?` <small>${d.sub}</small>`:''}</div></div>`).join('')}</div>
      <div class="scen">${C.scenarios.map(x=>`<div class="srow"><div class="sl"><b>${x.b}</b><span>${x.r}</span></div><div class="strack"><div class="sfill" data-w="${(x.p/Math.max(...C.scenarios.map(s=>s.p))*100)}" style="width:0%;background:linear-gradient(90deg,${x.c}88,${x.c})"></div></div><div class="sp" style="color:${x.c}">${x.p}%</div></div>`).join('')}</div>
      <div class="scaption">${C.distCaption}</div></div></section>

  <section class="anim" style="animation-delay:.2s">${eb('04','Profitability &amp; returns')}<div class="gauges">${C.profitability.map(g=>{
    const r=30,c=2*Math.PI*r,off=c*(1-Math.min(g.v,100)/100);
    return `<div class="gauge"><svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="7"/><circle cx="40" cy="40" r="${r}" fill="none" stroke="#45d6c6" stroke-width="7" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${c.toFixed(1)}" data-off="${off.toFixed(1)}" transform="rotate(-90 40 40)" class="arc"/><text x="40" y="45" text-anchor="middle" fill="#e8eef6" font-family="IBM Plex Mono" font-size="15" font-weight="600">${g.v}</text></svg><div class="gl">${g.l}</div><div class="gn"><b>${g.n}</b></div></div>`;
  }).join('')}</div></section>

  <section class="anim" style="animation-delay:.25s">${eb('05','Where '+SUBJ+' sits in its peer group')}<p class="railnote">${railNote}</p><div id="rails">${C.rails.map(railHTML).join('')}</div></section>

  <section class="anim" style="animation-delay:.3s">${eb('06','Income &amp; cash engine')}<div class="bars">${C.income.map(b=>`<div class="bar"><div class="bl">${b.bl}</div><div class="btrack"><div class="bfill${b.amber?' amber':''}" style="width:${b.pct}%"></div></div><div class="bv">${b.bv}</div></div>`).join('')}<div class="capex-flag">${C.incomeNoteHTML}</div></div></section>

  <section class="anim" style="animation-delay:.35s">${eb('07','Balance sheet')}<div class="grid g4">${C.balance.map(cellHTML).join('')}</div></section>

  <section class="anim" style="animation-delay:.4s">${eb('08','Analyst positioning')}<div class="analyst">
    <div class="atrack">
      <div class="amark" style="left:${apos(a.low)}%;background:var(--rose)"><span class="ml" style="color:var(--rose)">Low $${a.low}</span></div>
      <div class="amark cur" style="left:${apos(a.cur)}%;"><span class="ml" style="color:#fff">Now $${a.cur}</span></div>
      <div class="amark" style="left:${apos(a.avg)}%;background:var(--amber)"><span class="ml" style="color:var(--amber)">Avg $${a.avg}</span></div>
      <div class="amark" style="left:${apos(a.high)}%;background:var(--cyan)"><span class="ml" style="color:var(--cyan)">High $${a.high}</span></div>
    </div>
    <div class="aends"><span>$${a.low}</span><span>price-target range</span><span>$${a.high}</span></div>
    <div class="acon"><span class="pill">${a.pill}</span><span class="txt">${a.txt}</span></div></div></section>

  <section class="anim" style="animation-delay:.45s">${eb('09','Upcoming catalysts')}<div class="events">${C.events.map(e=>`<div class="ev${e.key?' key':''}"><div class="when">${e.when}<small>${e.sub}</small></div><div class="what"><b>${e.title}</b><p>${e.body}</p>${e.badge?`<span class="badge ${e.badgeCls||''}">${e.badge}</span>`:''}</div></div>`).join('')}</div></section>

  <footer class="foot">${C.footerHTML}</footer>`;

  // animate fills/arcs after layout
  requestAnimationFrame(()=>{
    document.querySelectorAll('.sfill').forEach(f=>{f.style.transition='width 1s cubic-bezier(.2,.7,.3,1)';f.style.width=f.dataset.w+'%';});
    document.querySelectorAll('.arc').forEach(a=>{a.style.transition='stroke-dashoffset 1s cubic-bezier(.2,.7,.3,1)';a.style.strokeDashoffset=a.dataset.off;});
  });
}

function railHTML(r){
  const peers=C.peerOrder, vals=peers.map(p=>r.v[p]), mn=Math.min(...vals), mx=Math.max(...vals), sp=(mx-mn)||1;
  const pos=v=>{const t=(v-mn)/sp;return r.higherBetter?t:(1-t);};
  const sorted=peers.slice().sort((x,y)=>r.higherBetter?r.v[y]-r.v[x]:r.v[x]-r.v[y]);
  const rank=sorted.indexOf(SUBJ)+1;
  const pts=peers.map(p=>{const left=(pos(r.v[p])*100).toFixed(1),m=p===SUBJ;return `<div class="pt${m?' subj':''}" style="left:${left}%"><span class="pl">${p}</span>${m?`<span class="pv">${r.v[p]}${r.unit}</span>`:''}</div>`;}).join('');
  const endL=r.higherBetter?mn+r.unit:mx+r.unit, endR=r.higherBetter?mx+r.unit:mn+r.unit;
  return `<div class="rail"><div class="rail-h"><div class="name">${r.name}<span>${r.sub}</span></div><div class="rank">${SUBJ} ${rank===1?'#1 best':'#'+rank+' of '+peers.length}</div></div><div class="track">${pts}</div><div class="scaleends"><span>${endL}</span><span>${endR}</span></div></div>`;
}

render();
</script>
